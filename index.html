<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>sikavial-skills</title>
  <style>
    body {
      background-color: #e5e7eb;
      color: #1f2937;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; }
    .logo { font-size: 24px; font-weight: bold; color: #5c5ce6; }
    .github { background: #5c5ce6; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; }
    .hero { background: white; padding: 30px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
    .hero h1 { font-size: 36px; margin: 0; }
    .stats { display: flex; justify-content: space-around; margin-top: 20px; }
    .stat { text-align: center; }
    .stat-num { font-size: 32px; color: #5c5ce6; font-weight: bold; }
    .stat-label { color: #666; }
    .install { background: #5c5ce6; color: white; padding: 30px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .install h2 { margin: 0 0 20px 0; }
    .btn-group { display: flex; gap: 15px; justify-content: center; }
    .btn { padding: 12px 30px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-download { background: white; color: #5c5ce6; }
    .btn-download:hover { opacity: 0.9; }
    .filters { text-align: center; margin: 20px 0; }
    .filter { padding: 10px 20px; margin: 0 5px; border: 1px solid #ddd; background: white; border-radius: 6px; cursor: pointer; }
    .filter.active { background: #5c5ce6; color: white; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
    .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
    .card-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
    .card-desc { color: #666; font-size: 14px; margin-bottom: 10px; }
    .card-cmd { background: #f3f4f6; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; margin-bottom: 10px; cursor: pointer; }
    .card-btns { display: flex; gap: 10px; }
    .card-btn { flex: 1; padding: 8px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; }
    .btn-copy { background: #5c5ce6; color: white; }
    .btn-code { background: #f3f4f6; color: #1f2937; border: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚡ sikavial-skills</div>
      <a href="https://github.com/teste0102/Skills" class="github">📦 GitHub</a>
    </header>

    <div class="hero">
      <h1>Claude Code Skills</h1>
      <p>Spec-driven development com 10 skills e 4 agentes</p>
      <div class="stats">
        <div class="stat">
          <div class="stat-num">6</div>
          <div class="stat-label">Skills</div>
        </div>
        <div class="stat">
          <div class="stat-num">4</div>
          <div class="stat-label">Agentes</div>
        </div>
        <div class="stat">
          <div class="stat-num">10</div>
          <div class="stat-label">Total</div>
        </div>
      </div>
    </div>

    <div class="install">
      <h2>⚡ Instalar em Segundos</h2>
      <div class="btn-group">
        <a href="https://raw.githubusercontent.com/teste0102/Skills/main/install.sh" download="install.sh" class="btn btn-download">🐧 Linux / Mac</a>
        <a href="https://raw.githubusercontent.com/teste0102/Skills/main/install.ps1" download="install.ps1" class="btn btn-download">🪟 Windows</a>
      </div>
    </div>

    <div class="filters">
      <button class="filter active" onclick="showAll()">Todos</button>
      <button class="filter" onclick="showSkills()">Skills</button>
      <button class="filter" onclick="showAgents()">Agentes</button>
    </div>

    <div class="grid" id="content">
      <p>Carregando...</p>
    </div>
  </div>

  <script>
    let allPlugins = [];

    async function loadPlugins() {
      try {
        const res = await fetch('https://raw.githubusercontent.com/teste0102/Skills/main/.claude-plugin/marketplace.json');
        const data = await res.json();
        allPlugins = data.plugins || [];
        showAll();
      } catch (e) {
        document.getElementById('content').innerHTML = '<p style="color:red">Erro ao carregar</p>';
      }
    }

    function showAll() {
      render(allPlugins);
      updateFilters(0);
    }

    function showSkills() {
      const skills = allPlugins.filter(p => !p.type || p.type !== 'agent');
      render(skills);
      updateFilters(1);
    }

    function showAgents() {
      const agents = allPlugins.filter(p => p.type === 'agent');
      render(agents);
      updateFilters(2);
    }

    function updateFilters(index) {
      document.querySelectorAll('.filter').forEach((btn, i) => {
        btn.classList.remove('active');
        if (i === index) btn.classList.add('active');
      });
    }

    function render(plugins) {
      let html = '';
      plugins.forEach(p => {
        const cmd = `/plugin install ${p.name}@sikavial-skills`;
        html += `
          <div class="card">
            <div style="color: #5c5ce6; font-size: 12px; font-weight: bold; margin-bottom: 8px;">
              ${p.type === 'agent' ? 'AGENTE' : 'SKILL'}
            </div>
            <div class="card-title">/${p.name}</div>
            <div class="card-desc">${p.description}</div>
            <div class="card-cmd" onclick="copyCmd(this)">${cmd}</div>
            <div class="card-btns">
              <button class="card-btn btn-copy" onclick="copyCmd(this)">Copiar</button>
              <a href="https://github.com/teste0102/Skills/tree/main/${p.source}" target="_blank" class="card-btn btn-code">Código</a>
            </div>
          </div>
        `;
      });
      document.getElementById('content').innerHTML = html;
    }

    function copyCmd(el) {
      const cmd = el.closest('.card').querySelector('.card-cmd').textContent;
      navigator.clipboard.writeText(cmd);
      alert('✅ Copiado!');
    }

    loadPlugins();
  </script>
</body>
</html>
