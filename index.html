<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sikavial-skills • Claude Code Marketplace</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #5c5ce6;
      --primary-dark: #3434a3;
      --bg: #0f0f1e;
      --surface: #1a1a2e;
      --surface-light: #25254a;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --accent: #00d9ff;
      --success: #00d97d;
    }

    body {
      background: linear-gradient(135deg, var(--bg) 0%, #1a1a3a 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 18px;
      margin-bottom: 20px;
    }

    .repo-link {
      display: inline-block;
      padding: 8px 16px;
      background: var(--surface-light);
      border: 1px solid var(--primary);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .repo-link:hover {
      background: var(--primary);
      color: white;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 60px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--surface-light);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-number {
      font-size: 32px;
      color: var(--accent);
      font-weight: bold;
      margin-bottom: 8px;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 14px;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--primary);
      background: transparent;
      color: var(--primary);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      color: white;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }

    .skill-card {
      background: var(--surface);
      border: 1px solid var(--surface-light);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .skill-card:hover {
      border-color: var(--primary);
      box-shadow: 0 8px 32px rgba(92, 92, 230, 0.2);
      transform: translateY(-4px);
    }

    .skill-type {
      display: inline-block;
      width: fit-content;
      padding: 4px 12px;
      background: var(--surface-light);
      border-radius: 20px;
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .skill-type.agent {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.1);
    }

    .skill-name {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--text);
    }

    .skill-desc {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 16px;
      flex-grow: 1;
      line-height: 1.5;
    }

    .skill-command {
      background: var(--surface-light);
      border: 1px solid var(--surface-light);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 12px;
      word-break: break-all;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .skill-command:hover {
      background: rgba(0, 217, 255, 0.1);
      border-color: var(--accent);
    }

    .skill-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .btn-copy {
      background: var(--primary);
      color: white;
    }

    .btn-copy:hover {
      background: var(--primary-dark);
    }

    .btn-github {
      background: var(--surface-light);
      color: var(--accent);
      border: 1px solid var(--primary);
    }

    .btn-github:hover {
      background: var(--primary);
      color: white;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid var(--surface-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
      padding: 16px;
      border-radius: 8px;
      text-align: center;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: black;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      z-index: 1000;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .section-title {
      font-size: 28px;
      font-weight: bold;
      margin-top: 60px;
      margin-bottom: 30px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--primary);
      color: var(--text);
    }

    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--surface-light);
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px 12px;
      }

      h1 {
        font-size: 32px;
      }

      .skills-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">⚡</div>
      <h1>sikavial-skills</h1>
      <p class="subtitle">Spec-driven development skills and agents for Claude Code</p>
      <a href="https://github.com/teste0102/Skills" class="repo-link">📦 Ver no GitHub</a>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="skill-count">0</div>
        <div class="stat-label">Skills</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="agent-count">0</div>
        <div class="stat-label">Agentes</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="total-count">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="skill">Skills</button>
      <button class="filter-btn" data-filter="agent">Agentes</button>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Carregando marketplace...</p>
      </div>
    </div>

    <footer>
      <p>© 2026 Sikavial • Desenvolvido com Claude Code</p>
    </footer>
  </div>

  <script>
    const GITHUB_RAW = 'https://raw.githubusercontent.com/teste0102/Skills/main/.claude-plugin/marketplace.json';

    let allPlugins = [];
    let currentFilter = 'all';

    const filterButtons = document.querySelectorAll('.filter-btn');
    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderPlugins();
      });
    });

    async function loadMarketplace() {
      try {
        const response = await fetch(GITHUB_RAW);
        if (!response.ok) throw new Error('Não consegui carregar o marketplace');
        
        const data = await response.json();
        allPlugins = data.plugins || [];
        
        updateStats();
        renderPlugins();
      } catch (error) {
        document.getElementById('content').innerHTML = `
          <div class="error">
            ❌ Erro ao carregar marketplace<br>
            <small>${error.message}</small>
          </div>
        `;
      }
    }

    function updateStats() {
      const skills = allPlugins.filter(p => !p.type || p.type !== 'agent');
      const agents = allPlugins.filter(p => p.type === 'agent');
      
      document.getElementById('skill-count').textContent = skills.length;
      document.getElementById('agent-count').textContent = agents.length;
      document.getElementById('total-count').textContent = allPlugins.length;
    }

    function renderPlugins() {
      let filtered = allPlugins;
      
      if (currentFilter === 'skill') {
        filtered = allPlugins.filter(p => !p.type || p.type !== 'agent');
      } else if (currentFilter === 'agent') {
        filtered = allPlugins.filter(p => p.type === 'agent');
      }

      if (filtered.length === 0) {
        document.getElementById('content').innerHTML = '<p class="error">Nenhum plugin encontrado</p>';
        return;
      }

      let html = '';
      
      // Agrupar por tipo se mostrar todos
      if (currentFilter === 'all') {
        const skills = filtered.filter(p => !p.type || p.type !== 'agent');
        const agents = filtered.filter(p => p.type === 'agent');

        if (skills.length > 0) {
          html += '<div class="section-title">Skills</div>';
          html += '<div class="skills-grid">';
          skills.forEach(plugin => {
            html += renderCard(plugin);
          });
          html += '</div>';
        }

        if (agents.length > 0) {
          html += '<div class="section-title">Agentes</div>';
          html += '<div class="skills-grid">';
          agents.forEach(plugin => {
            html += renderCard(plugin);
          });
          html += '</div>';
        }
      } else {
        html = '<div class="skills-grid">';
        filtered.forEach(plugin => {
          html += renderCard(plugin);
        });
        html += '</div>';
      }

      document.getElementById('content').innerHTML = html;
      attachEventListeners();
    }

    function renderCard(plugin) {
      const isAgent = plugin.type === 'agent';
      const command = `/plugin install ${plugin.name}@sikavial-skills`;
      const typeLabel = isAgent ? 'Agente' : 'Skill';
      const typeClass = isAgent ? 'agent' : '';

      return `
        <div class="skill-card">
          <span class="skill-type ${typeClass}">${typeLabel}</span>
          <h3 class="skill-name">/${plugin.name}</h3>
          <p class="skill-desc">${plugin.description}</p>
          <div class="skill-command" data-command="${command}">${command}</div>
          <div class="skill-actions">
            <button class="btn btn-copy" data-command="${command}">Copiar</button>
            <button class="btn btn-github" data-link="${plugin.source}">Ver Código</button>
          </div>
        </div>
      `;
    }

    function attachEventListeners() {
      // Copiar comando
      document.querySelectorAll('.btn-copy').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const command = e.target.dataset.command;
          navigator.clipboard.writeText(command).then(() => {
            showToast('✅ Comando copiado!');
          });
        });
      });

      // Copiar ao clicar no comando
      document.querySelectorAll('.skill-command').forEach(el => {
        el.addEventListener('click', () => {
          const command = el.dataset.command;
          navigator.clipboard.writeText(command).then(() => {
            showToast('✅ Comando copiado!');
          });
        });
      });

      // Ver código
      document.querySelectorAll('.btn-github').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const source = e.target.dataset.link;
          window.open(`https://github.com/teste0102/Skills/tree/main/${source}`, '_blank');
        });
      });
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    // Carregar ao iniciar
    loadMarketplace();
  </script>
</body>
</html>
