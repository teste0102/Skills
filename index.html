<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>sikavial-skills</title>
<style>
* { margin: 0; padding: 0; }
html, body { 
  background-color: #e5e7eb !important;
  color: #333;
  font-family: Arial, sans-serif;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.box { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; }
.logo { font-size: 24px; font-weight: bold; color: #5c5ce6; }
.btn { padding: 12px 24px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; background: #5c5ce6; color: white; }
.btn:hover { background: #3434a3; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.card { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
.card-cmd { background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 12px; margin: 10px 0; cursor: pointer; }
h2 { margin-top: 30px; margin-bottom: 20px; }
.badge { display: inline-block; background: #e0e7ff; color: #5c5ce6; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
.badge.agent { background: #fee2e2; color: #dc2626; }
</style>
</head>
<body>

<div class="container">

<div class="box header">
  <div class="logo">⚡ sikavial-skills</div>
  <a href="https://github.com/teste0102/Skills" class="btn">📦 GitHub</a>
</div>

<div class="box">
  <h1>Claude Code Skills</h1>
  <p>Spec-driven development com 10 skills e 4 agentes</p>
</div>

<div class="box">
  <h2>⚡ Instalar</h2>
  <button class="btn" onclick="download('install.sh')">🐧 Linux / Mac</button>
  <button class="btn" onclick="download('install.ps1')" style="margin-left: 10px;">🪟 Windows</button>
</div>

<h2>Skills</h2>
<div class="grid" id="skills"></div>

<h2>Agentes</h2>
<div class="grid" id="agents"></div>

</div>

<script>
function download(file) {
  const url = `https://raw.githubusercontent.com/teste0102/Skills/main/${file}`;
  window.location.href = url;
  setTimeout(() => {
    alert('✅ Download iniciado! Se não começou, tente novamente.');
  }, 500);
}

async function load() {
  try {
    const res = await fetch('https://raw.githubusercontent.com/teste0102/Skills/main/.claude-plugin/marketplace.json');
    const data = await res.json();
    
    const skills = data.plugins.filter(p => !p.type || p.type !== 'agent');
    const agents = data.plugins.filter(p => p.type === 'agent');
    
    let skillsHtml = skills.map(p => `
      <div class="card">
        <div class="badge">SKILL</div>
        <h3>/${p.name}</h3>
        <p>${p.description}</p>
        <div class="card-cmd" onclick="copyCmd(this)">/plugin install ${p.name}@sikavial-skills</div>
        <button class="btn" onclick="copyCmd(this)" style="width: 100%; margin-top: 10px;">Copiar Comando</button>
      </div>
    `).join('');
    
    let agentsHtml = agents.map(p => `
      <div class="card">
        <div class="badge agent">AGENTE</div>
        <h3>/${p.name}</h3>
        <p>${p.description}</p>
        <div class="card-cmd" onclick="copyCmd(this)">/plugin install ${p.name}@sikavial-skills</div>
        <button class="btn" onclick="copyCmd(this)" style="width: 100%; margin-top: 10px;">Copiar Comando</button>
      </div>
    `).join('');
    
    document.getElementById('skills').innerHTML = skillsHtml || '<p>Nenhuma skill encontrada</p>';
    document.getElementById('agents').innerHTML = agentsHtml || '<p>Nenhum agente encontrado</p>';
    
  } catch (e) {
    console.error(e);
    document.getElementById('skills').innerHTML = '<p style="color: red;">❌ Erro ao carregar marketplace</p>';
  }
}

function copyCmd(el) {
  const cmd = el.textContent || el.innerText;
  navigator.clipboard.writeText(cmd);
  alert('✅ Copiado: ' + cmd);
}

load();
</script>

</body>
</html>
